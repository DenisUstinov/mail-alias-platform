name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api]  # сюда добавлять новые сервисы
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
          docker build --pull --cache-from $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} ./services/${{ matrix.service }}
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

  deploy-to-server:
    name: Deploy to Dev Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pull images on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "
            cd ${{ secrets.DEV_APP_PATH }} &&
            docker compose pull
          "

      - name: Run Alembic migrations
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "
            cd ${{ secrets.DEV_APP_PATH }} &&
            docker compose run --rm -e ENV=dev api alembic upgrade head
          "

      - name: Start services cleanly
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "
            cd ${{ secrets.DEV_APP_PATH }} &&
            docker compose up -d --remove-orphans --build
          "

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "docker compose ps"

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "curl -f http://localhost:8000/health || exit 1"

      - name: Prometheus endpoint check
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "curl -f http://localhost:8000/metrics || exit 1"

      - name: Validate Sentry DSN
        run: |
          if [ -z "${{ secrets.SENTRY_DSN }}" ]; then
            echo "Sentry DSN is missing"
            exit 1
          fi
